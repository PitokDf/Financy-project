name: CI/CD Pipeline - Deploy Clustering

on:
  push:
    branches: ["main"]
    paths:
      - 'clustering/**'
      - '!clustering/.gitignore'
      - 'docker-compose.yml'
      - '.github/workflows/deploy-clustering.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: pitokdf/financy-clustering

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./clustering
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy docker-compose file to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "./docker-compose.yml"
          target: "~/financy-project"

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          CLIENT_URL: ${{ secrets.CLIENT_URL }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          BACKEND_IMAGE_NAME: pitokdf/financy-backend
          COOKIES_DOMAIN: ${{ secrets.COOKIES_DOMAIN }}
          JWT_ISSUER: ${{ secrets.JWT_ISSUER }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DATABASE_URL,JWT_SECRET,REDIS_PASSWORD,VAPID_PUBLIC_KEY,VAPID_PRIVATE_KEY,CLIENT_URL,ALLOWED_ORIGINS,REGISTRY,IMAGE_NAME,BACKEND_IMAGE_NAME,COOKIES_DOMAIN,JWT_ISSUER
          script: |
            cd ~/financy-project

            # Cleanup accidental directories created by Docker bind-mount failures
            # Then ensure the correct data directory exists
            rm -rf ~/financy-project/clustering/classifier_model.joblib
            rm -rf ~/financy-project/clustering/feedback_corrections.json
            mkdir -p ~/financy-project/clustering/data

            # Update .env file to ensure CLUSTERING_IMAGE is present
            cat <<EOF > .env
            DATABASE_URL=$DATABASE_URL
            JWT_SECRET=$JWT_SECRET
            REDIS_PASSWORD=$REDIS_PASSWORD
            VAPID_PUBLIC_KEY=$VAPID_PUBLIC_KEY
            VAPID_PRIVATE_KEY=$VAPID_PRIVATE_KEY
            CLIENT_URL=$CLIENT_URL
            ALLOWED_ORIGINS=$ALLOWED_ORIGINS
            BACKEND_IMAGE=$REGISTRY/$BACKEND_IMAGE_NAME:main
            CLUSTERING_IMAGE=$REGISTRY/$IMAGE_NAME:main
            COOKIES_DOMAIN=$COOKIES_DOMAIN
            JWT_ISSUER=$JWT_ISSUER
            EOF

            # Copy docker-compose.yml to the target directory (sent from CI context)
            # Since appleboy/ssh-action doesn't transfer files, we assume the user's deploy.yml
            # or a previous step ensures the compose file is there.
            # In clustering deploy, we should also copy the latest docker-compose.yml
            
            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login $REGISTRY -u ${{ github.actor }} --password-stdin

            docker compose pull
            docker compose up -d clustering
            
            # Clean up
            docker image prune -af
