name: CI/CD Pipeline - Deploy Backend

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: pitokdf/financy-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create project directory on VPS if it does not exist
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/financy-project

      - name: Copy docker-compose file to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "./docker-compose.yml"
          target: "~/financy-project"

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          CLIENT_URL: ${{ secrets.CLIENT_URL }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          COOKIES_DOMAIN: ${{ vars.COOKIES_DOMAIN }}
          JWT_ISSUER: ${{ vars.JWT_ISSUER }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DATABASE_URL,JWT_SECRET,REDIS_PASSWORD,VAPID_PUBLIC_KEY,VAPID_PRIVATE_KEY,CLIENT_URL,ALLOWED_ORIGINS,REGISTRY,IMAGE_NAME
          script: |
            cd ~/financy-project

            # Create .env file 
            cat <<EOF > .env
            DATABASE_URL=$DATABASE_URL
            JWT_SECRET=$JWT_SECRET
            REDIS_PASSWORD=$REDIS_PASSWORD
            VAPID_PUBLIC_KEY=$VAPID_PUBLIC_KEY
            VAPID_PRIVATE_KEY=$VAPID_PRIVATE_KEY
            CLIENT_URL=$CLIENT_URL
            ALLOWED_ORIGINS=$ALLOWED_ORIGINS
            BACKEND_IMAGE=$REGISTRY/$IMAGE_NAME:main
            COOKIES_DOMAIN=$COOKIES_DOMAIN
            JWT_ISSUER=$JWT_ISSUER
            EOF

            # Login to GHCR (using the automatic GITHUB_TOKEN)
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login $REGISTRY -u ${{ github.actor }} --password-stdin

            docker compose pull
            docker compose up -d
