name: CI/CD Pipeline - Deploy Backend

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up SSH Key Manual
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$SSH_KEY" ]; then
            echo "❌ ERROR: Secret SSH_PRIVATE_KEY is EMPTY!"
            exit 1
          fi
          mkdir -p ~/.ssh
          
          # Write to raw file first
          printf "%s\n" "$SSH_KEY" > ~/.ssh/id_rsa_raw
          
          # SUPER CLEAN: Remove Windows line endings (\r) AND trailing spaces
          tr -d '\r' < ~/.ssh/id_rsa_raw | sed 's/[[:space:]]*$//' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Debugging info
          echo "Key file cleaned. Size: $(wc -c < ~/.ssh/id_rsa) bytes"
          head -n 1 ~/.ssh/id_rsa
          tail -n 1 ~/.ssh/id_rsa
          
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
          eval $(ssh-agent -s)
          ssh-add ~/.ssh/id_rsa
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> $GITHUB_ENV

      - name: Copy docker-compose.yml to server
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "mkdir -p ~/financy-project"
          scp docker-compose.yml ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:~/financy-project/

      - name: Deploy to Server via SSH
        env:
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          CLIENT_URL: ${{ secrets.CLIENT_URL }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          ssh $SERVER_USER@$SERVER_HOST << EOF
            cd ~/financy-project

            # Create .env file from exported variables
            cat <<INNER_EOF > .env
            DATABASE_URL=$DATABASE_URL
            JWT_SECRET=$JWT_SECRET
            REDIS_PASSWORD=$REDIS_PASSWORD
            VAPID_PUBLIC_KEY=$VAPID_PUBLIC_KEY
            VAPID_PRIVATE_KEY=$VAPID_PRIVATE_KEY
            CLIENT_URL=$CLIENT_URL
            ALLOWED_ORIGINS=$ALLOWED_ORIGINS
            BACKEND_IMAGE=$REGISTRY/$IMAGE_NAME:main
            INNER_EOF

            # Login and Deploy
            echo "$GH_TOKEN" | docker login $REGISTRY -u $GH_ACTOR --password-stdin
            docker compose pull
            docker compose up -d
          EOF
