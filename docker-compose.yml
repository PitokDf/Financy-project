services:
  api:
    image: ${BACKEND_IMAGE:-financy-backend:latest}
    container_name: financy-api
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - NODE_ENV=production
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - CLIENT_URL=${CLIENT_URL}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - COOKIES_DOMAIN=${COOKIES_DOMAIN}
      - JWT_ISSUER=${JWT_ISSUER}
      - ML_SERVICE_URL=http://clustering:8000
    ports:
      - "6789:6789"
    depends_on:
      redis:
        condition: service_started
      clustering:
        condition: service_started

  clustering:
    image: ${CLUSTERING_IMAGE:-financy-clustering:latest}
    container_name: financy-clustering
    restart: always
    volumes:
      - ./clustering/data:/app/data
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    dns:
      - 8.8.8.8
      - 8.8.4.4

  redis:
    image: redis:alpine
    container_name: financy-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data

volumes:
  redis_data:
